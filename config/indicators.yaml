# Indicator → module mapping and metadata
modules:
  trend:
    indicators:
      - lme_gold_price
  inventory:
    indicators:
      - lme_inventory
      - shfe_inventory
      - comex_inventory
      - spot_premium
      - term_structure
  physical_demand:
    indicators:
      - social_financing
      - m1
  macro_liquidity:
    indicators:
      - dxy
      - us_10y_real_rate
      - us_cpi_yoy
  financial_flow:
    indicators: []
    events_file: data/raw/market_events.csv

units:
  lme_gold_price: USD/oz
  lme_inventory: ton
  shfe_inventory: ton
  comex_inventory: ton
  spot_premium: USD/oz
  term_structure: label
  social_financing: CNY_bn
  m1: CNY_bn
  dxy: index
  us_10y_real_rate: pct
  us_cpi_yoy: pct

frequencies:
  lme_gold_price: daily
  lme_inventory: daily
  shfe_inventory: daily
  comex_inventory: daily
  spot_premium: daily
  term_structure: daily
  social_financing: monthly
  m1: monthly
  dxy: daily
  us_10y_real_rate: daily
  us_cpi_yoy: monthly
