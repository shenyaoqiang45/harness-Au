# Data source registry for live fetching
lookback_days: 400

sources:
  yahoo:
    enabled: true
    indicators:
      lme_gold_price:
        ticker: "GC=F"
        unit: USD/oz
        frequency: daily
        source: Yahoo Finance
        source_url: https://finance.yahoo.com/quote/GC=F
        confidence: B
        note: "COMEX front-month proxy for London gold (USD/troy oz)"
      dxy:
        ticker: "DX-Y.NYB"
        unit: index
        frequency: daily
        source: Yahoo Finance
        source_url: https://finance.yahoo.com/quote/DX-Y.NYB
        confidence: B

  fred:
    enabled: true
    indicators:
      us_10y_real_rate:
        series_id: DFII10
        unit: pct
        frequency: daily
        source: FRED
        source_url: https://fred.stlouisfed.org/series/DFII10
        confidence: A
      us_cpi_yoy:
        series_id: CPIAUCSL
        transform: yoy_pct
        unit: pct
        frequency: monthly
        source: FRED
        source_url: https://fred.stlouisfed.org/series/CPIAUCSL
        confidence: A
        note: "US CPI YoY derived from FRED CPIAUCSL index"

  eastmoney:
    # lme_inventory removed: Eastmoney column '金-库存' no longer available.
    # LME inventory is now loaded from inventory_csv source below.
    enabled: true
    indicators: {}

  akshare:
    enabled: true
    indicators:
      shfe_inventory:
        func: futures_inventory_em
        kwargs: { symbol: "沪金" }
        date_col: 日期
        value_col: 库存
        unit: ton
        frequency: daily
        source: 东方财富-SHFE
        source_url: https://www.shfe.com.cn/reports/businessdata/prmsummary/
        confidence: A
        note: "SHFE gold warehouse receipt / inventory daily (ton); Eastmoney mirror of SHFE official"
      social_financing:
        func: macro_china_new_financial_credit
        date_col: 月份
        value_col: 当月
        transform: parse_cn_month
        unit: CNY_bn
        frequency: monthly
        source: 东方财富-社融
        source_url: https://data.eastmoney.com/cjsj/xzxd.html
        confidence: A
      m1:
        func: macro_china_money_supply
        date_col: 月份
        value_col: 货币(M1)-数量(亿元)
        transform: parse_cn_month
        unit: CNY_bn
        frequency: monthly
        source: 东方财富-货币供应
        source_url: https://data.eastmoney.com/cjsj/hbgyl.html
        confidence: A

  cme:
    # CME XLS endpoint returns 403 Forbidden.
    # COMEX inventory is now loaded from inventory_csv source below.
    enabled: false
    indicators:
      comex_inventory:
        unit: ton
        frequency: daily
        source: CME Group
        source_url: https://www.cmegroup.com/delivery_reports/Gold_Stocks.xls
        confidence: A
        note: "COMEX gold warehouse stocks; official report in troy oz, stored as metric ton"

  # inventory_csv: load LME, SHFE, COMEX stocks from data/raw/gold_inventory.csv.
  # Update the CSV file regularly (e.g. weekly) to keep inventory data current.
  inventory_csv:
    enabled: true
    indicators:
      lme_inventory:
        unit: ton
        frequency: daily
        source: 手动维护-LME
        source_url: https://www.lme.com/Market-data/Reports-and-data/Warehouse-and-stock-reports
        confidence: B
        note: "LME gold warehouse stocks loaded from gold_inventory.csv"
      comex_inventory:
        unit: ton
        frequency: daily
        source: 手动维护-COMEX
        source_url: https://www.cmegroup.com/delivery_reports/Gold_Stocks.xls
        confidence: B
        note: "COMEX gold warehouse stocks loaded from gold_inventory.csv"

  derived:
    enabled: true
    indicators:
      spot_premium:
        func: shfe_lme_premium
        unit: USD/oz
        frequency: daily
        source: derived
        source_url: ""
        confidence: C
      term_structure:
        func: premium_to_curve
        unit: label
        frequency: daily
        source: derived
        source_url: ""
        confidence: C

# Optional indicators: tracked when available but excluded from completeness scoring.
# lme_inventory and comex_inventory removed from optional: they are now wired
# to inventory_csv and should count toward completeness scoring.
optional: []

unwired: {}
